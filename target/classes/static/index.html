<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Personas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
<div class="max-w-5xl mx-auto px-4 py-10">

    <div class="mb-8 flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">Directorio</h1>
            <p class="text-slate-500 text-sm mt-1">Administración de usuarios mediante Spring Data REST</p>
        </div>
        <span class="bg-indigo-100 text-indigo-800 text-sm font-medium px-4 py-1.5 rounded-full shadow-sm" id="totalCount">0 Registros</span>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8 transition-all">
        <h2 class="text-lg font-semibold mb-4 text-slate-800 flex items-center gap-2" id="formTitle">
            <i class="fas fa-user-plus text-indigo-500"></i> Registrar Nueva Persona
        </h2>
        <form id="personForm" class="flex flex-col md:flex-row gap-5 items-end">
            <input type="hidden" id="personUrl">
            <div class="flex-1 w-full">
                <label for="firstName" class="block text-sm font-medium text-slate-700 mb-1.5">Nombre</label>
                <input type="text" id="firstName" class="w-full rounded-lg border border-slate-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow" placeholder="Ej. Valeria" required>
            </div>
            <div class="flex-1 w-full">
                <label for="lastName" class="block text-sm font-medium text-slate-700 mb-1.5">Apellido</label>
                <input type="text" id="lastName" class="w-full rounded-lg border border-slate-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow" placeholder="Ej. Molina" required>
            </div>
            <div class="flex gap-3 w-full md:w-auto mt-4 md:mt-0">
                <button type="button" onclick="resetForm()" class="w-full md:w-auto bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 px-5 rounded-lg transition-colors hidden" id="cancelBtn">
                    Cancelar
                </button>
                <button type="submit" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-6 rounded-lg transition-colors shadow-sm flex items-center justify-center gap-2">
                    <i class="fas fa-save"></i> Guardar
                </button>
            </div>
        </form>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse" id="personTable">
                <thead>
                <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase text-slate-500 font-semibold tracking-wider">
                    <th class="px-6 py-4">Nombre</th>
                    <th class="px-6 py-4">Apellido</th>
                    <th class="px-6 py-4 text-right">Acciones</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-200">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const apiUrl = 'http://localhost:9090/people';

    // Manejo del formulario (Crear y Actualizar)
    document.getElementById('personForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const url = document.getElementById('personUrl').value;
        const method = url ? 'PUT' : 'POST';
        const targetUrl = url || apiUrl;

        const data = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value
        };

        await fetch(targetUrl, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        resetForm();
        loadPeople();
    });

    // Cargar los datos desde el backend
    async function loadPeople() {
        const response = await fetch(apiUrl);
        const data = await response.json();
        const people = data._embedded ? data._embedded.people : [];

        document.getElementById('totalCount').innerText = `${people.length} ${people.length === 1 ? 'Registro' : 'Registros'}`;
        const tbody = document.querySelector('#personTable tbody');
        tbody.innerHTML = '';

        if (people.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-10 text-center text-slate-500">No hay personas registradas en la base de datos.</td></tr>`;
            return;
        }

        people.forEach(person => {
            const tr = document.createElement('tr');
            tr.className = 'hover:bg-slate-50 transition-colors group';
            const url = person._links.self.href;
            tr.innerHTML = `
                    <td class="px-6 py-4 font-medium text-slate-900">${person.firstName}</td>
                    <td class="px-6 py-4 text-slate-600">${person.lastName}</td>
                    <td class="px-6 py-4 text-right">
                        <div class="opacity-0 group-hover:opacity-100 transition-opacity flex justify-end gap-2">
                            <button onclick="editPerson('${person.firstName}', '${person.lastName}', '${url}')" class="text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 h-8 w-8 rounded transition-colors" title="Editar">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deletePerson('${url}')" class="text-red-600 hover:text-red-800 bg-red-50 hover:bg-red-100 h-8 w-8 rounded transition-colors" title="Eliminar">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </td>
                `;
            tbody.appendChild(tr);
        });
    }

    // Preparar el formulario para edición
    function editPerson(firstName, lastName, url) {
        document.getElementById('firstName').value = firstName;
        document.getElementById('lastName').value = lastName;
        document.getElementById('personUrl').value = url;

        const titleInfo = document.getElementById('formTitle');
        titleInfo.innerHTML = '<i class="fas fa-user-edit text-indigo-500"></i> Editar Persona';
        document.getElementById('cancelBtn').classList.remove('hidden');
    }

    // Limpiar el formulario
    function resetForm() {
        document.getElementById('personForm').reset();
        document.getElementById('personUrl').value = '';
        const titleInfo = document.getElementById('formTitle');
        titleInfo.innerHTML = '<i class="fas fa-user-plus text-indigo-500"></i> Registrar Nueva Persona';
        document.getElementById('cancelBtn').classList.add('hidden');
    }

    // Eliminar registro
    async function deletePerson(url) {
        if(confirm('¿Estás seguro de que deseas eliminar este registro de forma permanente?')) {
            await fetch(url, { method: 'DELETE' });
            loadPeople();
        }
    }

    // Inicializar
    loadPeople();
</script>
</body>
</html>
